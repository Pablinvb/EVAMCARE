services:
  dermascan:
    build:
      context: .
      dockerfile: Dockerfile
    image: dermascan-ai:local
    container_name: dermascan-ai
    restart: unless-stopped
    environment:
      DERMASCAN_ENV: ${DERMASCAN_ENV:-development}
      DERMASCAN_HOST: 0.0.0.0
      DERMASCAN_PORT: 8000
      DERMASCAN_DATABASE_PATH: /app/data/dermascan.db
      DERMASCAN_MAX_UPLOAD_MB: ${DERMASCAN_MAX_UPLOAD_MB:-10}
      DERMASCAN_MAX_IMAGE_MEGAPIXELS: ${DERMASCAN_MAX_IMAGE_MEGAPIXELS:-16}
      DERMASCAN_RATE_LIMIT_REQUESTS: ${DERMASCAN_RATE_LIMIT_REQUESTS:-20}
      DERMASCAN_RATE_LIMIT_WINDOW_SECONDS: ${DERMASCAN_RATE_LIMIT_WINDOW_SECONDS:-600}
      DERMASCAN_CORS_ORIGINS: ${DERMASCAN_CORS_ORIGINS:-http://127.0.0.1:8000,http://localhost:8000}
      DERMASCAN_REFERRAL_TOKEN_SECRET: ${DERMASCAN_REFERRAL_TOKEN_SECRET:-development-only-change-this-secret}
      DERMASCAN_REFERRAL_TOKEN_TTL_SECONDS: ${DERMASCAN_REFERRAL_TOKEN_TTL_SECONDS:-3600}
      DERMASCAN_PARTNER_API_KEY: ${DERMASCAN_PARTNER_API_KEY:-development-partner-key}
    ports:
      - "${DERMASCAN_PORT:-8000}:8000"
    volumes:
      - dermascan_data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  dermascan_data:
